name: p2p_talk
description: P2P encrypted chat app for Windows & Android
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.10.0
  web_socket_channel: ^3.0.1
  multicast_dns: ^0.3.2+6
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  pointycastle: ^3.9.1
  convert: ^3.1.1
  uuid: ^4.5.1
  provider: ^6.1.2
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
